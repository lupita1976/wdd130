<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="A basic HTML structure example using semantic HTML elements"
      content="Guadalupe Fernandez">
    <title>Basic Html Structure</title>
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="image" width="128" height="128">
        <nav>
            <ul>
                <li><a
                      href="https://www.churchofjesuschrist.org/study/magazines?lang=eng">Magazines</a>
                </li>
                <li><a href="https://www.churchofjesuschrist.org/study/books-and-lessons?lang=eng">Books
                        and Lessons</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Basic Html Structure</h1>
        <section>
            <h2>Heading 1</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Distinctio,
                reprehenderit?</p>
        </section>
        <section>
            <h2>Heading 2</h2>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Iste, est.</p>
        </section>
        <aside>
            <img
              src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/aba-nigeria/1280x800/aba-nigeria-temple-lds-1636397-wallpaper.jpg"
              alt="Image Temple" width="200">

        </aside>

    </main>
    <footer>
        <p>Guadalupe Fernandez</p>
    </footer>

</body>

</html>
